name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)release, e.g. v0.1.0'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore (fail on known-vulnerable packages)
        run: dotnet restore --locked-mode "-p:WarningsAsErrors=NU1901%3BNU1902%3BNU1903%3BNU1904"

      - run: dotnet build --no-restore -c Release
      - run: dotnet test --no-build -c Release --nologo

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            os: macos-latest
            archive: tar.gz
          - rid: osx-x64
            os: macos-latest
            archive: tar.gz
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
          - rid: linux-arm64
            os: ubuntu-latest
            archive: tar.gz
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: win-arm64
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Publish (self-contained, single file)
        shell: bash
        run: |
          dotnet publish src/TaxClaw.Tui/TaxClaw.Tui.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.version }} \
            -o publish/${{ matrix.rid }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          tar -czf "${{ github.workspace }}/tax-claw-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz" .

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" `
            -DestinationPath "tax-claw-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: tax-claw-${{ matrix.rid }}
          path: tax-claw-${{ steps.version.outputs.version }}-${{ matrix.rid }}.*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts and checksum
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/ \;
          cp scripts/install.sh dist/install.sh
          (cd dist && sha256sum -- * > SHA256SUMS)
          ls -la dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
